<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PDF Chatbot</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; }
      textarea { width: 100%; height: 100px; }
      #answer { white-space: pre-wrap; margin-top: 1rem; padding: .5rem; border: 1px solid #ddd; }
    </style>
  </head>
  <body>
    <h1>PDF Chatbot</h1>
    <p>Ask a question about the PDF placed at <code>data/document.pdf</code>.</p>
    <textarea id="query" placeholder="Type your question here..."></textarea>
    <br/>
    <button id="ask">Ask</button>
    <div id="answer"></div>

    <script>
      document.getElementById('ask').addEventListener('click', async () => {
        const q = document.getElementById('query').value;
        document.getElementById('answer').textContent = 'Thinking...';
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        const j = await res.json();
        if (j.error) document.getElementById('answer').textContent = 'Error: ' + j.error;
        else document.getElementById('answer').textContent = j.answer;
      });
    </script>
  </body>
</html>
