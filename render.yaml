services:
  - type: web
    name: sustainability-chatbot-api
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: USE_RERANKER
        value: "false"
      - key: USE_HYBRID_SEARCH
        value: "true"
